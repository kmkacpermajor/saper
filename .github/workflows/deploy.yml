name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
  REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REPO: saper
  BACKEND_IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/saper/game-backend
  FRONTEND_IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/saper/frontend
  TF_STATE_BUCKET: saper-tfstate-${{ secrets.GCP_PROJECT_ID }}
  TF_STATE_PREFIX: prod

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      backend_image: ${{ steps.image_refs.outputs.backend_image }}
      frontend_image: ${{ steps.image_refs.outputs.frontend_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: game-backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE_BASE }}:${{ github.sha }}

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE_BASE }}:${{ github.sha }}

      - name: Capture image digests
        id: image_refs
        run: |
          echo "backend_image=${{ env.BACKEND_IMAGE_BASE }}@${{ steps.build_backend.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.FRONTEND_IMAGE_BASE }}@${{ steps.build_frontend.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.5"

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="prefix=${{ env.TF_STATE_PREFIX }}"

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_project_number: ${{ env.PROJECT_NUMBER }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_backend_image: ${{ steps.image_refs.outputs.backend_image }}
          TF_VAR_frontend_image: ${{ steps.image_refs.outputs.frontend_image }}
        run: terraform plan -input=false -out=tfplan

      - name: Summarize Terraform plan
        working-directory: terraform
        run: |
          echo "## Terraform plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          terraform show -json tfplan > tfplan.json
          adds=$(jq -r '[.resource_changes[]?.change.actions[]? | select(. == "create")] | length' tfplan.json)
          changes=$(jq -r '[.resource_changes[]?.change.actions[]? | select(. == "update")] | length' tfplan.json)
          destroys=$(jq -r '[.resource_changes[]?.change.actions[]? | select(. == "delete")] | length' tfplan.json)
          echo "- Adds: $adds" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changes: $changes" >> "$GITHUB_STEP_SUMMARY"
          echo "- Destroys: $destroys" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Resource changes" >> "$GITHUB_STEP_SUMMARY"
          jq -r '
            .resource_changes[]? |
            "- [" + (.change.actions | join(",")) + "] " + .type + "." + .name
          ' tfplan.json >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Full plan" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Show plan</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/tfplan

  apply:
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: terraform

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="prefix=${{ env.TF_STATE_PREFIX }}"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -input=false tfplan
