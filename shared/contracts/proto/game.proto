syntax = "proto3";

package saper;

enum GameState {
  GAME_STATE_IN_PROGRESS = 0;
  GAME_STATE_WON = 1;
  GAME_STATE_LOST = 2;
  GAME_STATE_CONNECTING = -1;
  GAME_STATE_DISCONNECTED = -2;
}

enum TileType {
  TILE_TYPE_HIDDEN = 0;
  TILE_TYPE_FLAGGED = 1;
  TILE_TYPE_MINE = 2;
  TILE_TYPE_EMPTY = 3;
  TILE_TYPE_ONE = 4;
  TILE_TYPE_TWO = 5;
  TILE_TYPE_THREE = 6;
  TILE_TYPE_FOUR = 7;
  TILE_TYPE_FIVE = 8;
  TILE_TYPE_SIX = 9;
  TILE_TYPE_SEVEN = 10;
  TILE_TYPE_EIGHT = 11;
}

enum Difficulty {
  DIFFICULTY_EASY = 0;
  DIFFICULTY_INTERMEDIATE = 1;
  DIFFICULTY_HARD = 2;
  DIFFICULTY_EXPERT = 3;
  DIFFICULTY_CUSTOM = 4;
}

enum BoardSize {
  BOARD_SIZE_SMALL = 0;
  BOARD_SIZE_MEDIUM = 1;
  BOARD_SIZE_BIG = 2;
  BOARD_SIZE_HUGE = 3;
  BOARD_SIZE_CUSTOM = 4;
}

message CreateGameRequest {
  Difficulty difficulty = 1;
  BoardSize board_size = 2;
  uint32 custom_rows = 3;
  uint32 custom_cols = 4;
  uint32 custom_num_bombs = 5;
}

// Joins an already existing game session by id.
message JoinGameRequest {
  uint32 requested_game_id = 1;
}

message TileCoordinates {
  uint32 y = 1;
  uint32 x = 2;
}

message RevealTileRequest {
  repeated TileCoordinates tiles = 1;
}

message FlagTileRequest {
  uint32 y = 1;
  uint32 x = 2;
  bool unflag = 3;
}

message CursorClickRequest {
  TileCoordinates tile = 1;
}

message ResetRequest {}

message ClientMessage {
  uint32 contract_version = 1;
  oneof payload {
    CreateGameRequest create_game = 2;
    JoinGameRequest join_game = 3;
    RevealTileRequest reveal_tile = 4;
    FlagTileRequest flag_tile = 5;
    ResetRequest reset = 6;
    CursorClickRequest cursor_click = 7;
  }
}

message TileUpdate {
  uint32 y = 1;
  uint32 x = 2;
  TileType type = 3;
}

message ConnectResponse {
  uint32 game_id = 1;
  uint32 rows = 2;
  uint32 cols = 3;
  uint32 num_bombs = 4;
  uint32 player_id = 5;
  Difficulty difficulty = 6;
  BoardSize board_size = 7;
}

message RevealTilesResponse {
  repeated TileUpdate tiles = 1;
}

message GameOverResponse {
  GameState state = 1;
  uint32 gameTimeMs = 2;
}

message LeaderboardEntry {
  uint32 id = 1;
  repeated string player_names = 2;
  uint32 time_ms = 3;
}

message LeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
}

message ResetResponse {}

message ErrorResponse {
  string code = 1;
  string message = 2;
}

message PlayerCursorUpdateResponse {
  uint32 player_id = 1;
  TileCoordinates tile = 2;
}

message PlayerCursorRemoveResponse {
  uint32 player_id = 1;
}

message ServerMessage {
  uint32 contract_version = 1;
  oneof payload {
    ConnectResponse connect = 2;
    RevealTilesResponse reveal_tiles = 3;
    GameOverResponse game_over = 4;
    ResetResponse reset = 5;
    ErrorResponse error = 6;
    PlayerCursorUpdateResponse player_cursor_update = 7;
    PlayerCursorRemoveResponse player_cursor_remove = 8;
  }
}
